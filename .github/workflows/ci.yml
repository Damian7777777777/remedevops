name: DevOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  debug-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 🔧 CRÍTICO: instalar dependencias nativas para better-sqlite3
      - name: Install native build tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3 make g++ build-essential

      - name: Verificar Node y npm
        run: |
          node -v
          npm -v

      # ===== BLUE =====
      - name: Install blue
        working-directory: ./proyecto-devops
        run: npm ci --build-from-source

      - name: Test blue
        working-directory: ./proyecto-devops
        run: npm test

      # ===== GREEN =====
      - name: Install green
        working-directory: ./proyecto-devops-green
        run: npm ci --build-from-source

      - name: Test green
        working-directory: ./proyecto-devops-green
        run: npm test
