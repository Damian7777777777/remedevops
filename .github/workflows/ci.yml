name: DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-blue:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (blue)
        working-directory: ./proyecto-devops
        run: npm install

      - name: Run tests (blue)
        working-directory: ./proyecto-devops
        run: npm test

  test-green:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (green)
        working-directory: ./proyecto-devops-green
        run: npm install

      - name: Run tests (green)
        working-directory: ./proyecto-devops-green
        run: npm test
