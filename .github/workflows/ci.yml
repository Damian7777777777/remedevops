name: DevOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install native build tools
        run: sudo apt-get update -y && sudo apt-get install -y python3 make g++ build-essential

      - name: Reset database
        run: rm -f proyecto-devops/database.db

      - name: Install & Test
        working-directory: ./proyecto-devops
        run: |
          npm ci --build-from-source
          npm test

  # ─────────────────────────────────────────────
  k6:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6

      - name: Run k6 tests against GCP server
        run: |
          k6 run - <<EOF
          import http from 'k6/http';
          import { check, sleep } from 'k6';
          export const options = { vus: 10, duration: '30s' };
          const BASE_URL = 'http://34.133.237.146';
          export default function () {
            const health = http.get(\`\${BASE_URL}/health\`);
            check(health, { 'health status 200': (r) => r.status === 200 });
            const register = http.post(
              \`\${BASE_URL}/api/auth/register\`,
              JSON.stringify({ username: \`user_\${Math.random()}\`, password: '123456' }),
              { headers: { 'Content-Type': 'application/json' } }
            );
            check(register, { 'register status 200': (r) => r.status === 200 });
            sleep(1);
          }
          EOF

  # ─────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: k6
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image base
        run: echo "IMAGE_BASE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build & Push app-blue
        uses: docker/build-push-action@v5
        with:
          context: ./proyecto-devops
          push: true
          build-args: COLOR=blue
          tags: ${{ env.IMAGE_BASE }}/app-blue:latest

      - name: Build & Push app-green
        uses: docker/build-push-action@v5
        with:
          context: ./proyecto-devops
          push: true
          build-args: COLOR=green
          tags: ${{ env.IMAGE_BASE }}/app-green:latest

  # ─────────────────────────────────────────────
  determine-color:
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      active: ${{ steps.color.outputs.active }}
      next: ${{ steps.color.outputs.next }}
    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.GCP_SSH_KEY }}" > /tmp/gcp_key
          chmod 600 /tmp/gcp_key

      - name: Detect active color from server
        id: color
        run: |
          ACTIVE=$(ssh -i /tmp/gcp_key -o StrictHostKeyChecking=no \
            ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} \
            'if docker inspect app-blue &>/dev/null && [ "$(docker inspect -f "{{.State.Running}}" app-blue)" = "true" ]; then echo "blue"; else echo "green"; fi')

          if [ "$ACTIVE" = "blue" ]; then
            NEXT="green"
          else
            NEXT="blue"
          fi

          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          echo "next=$NEXT"     >> $GITHUB_OUTPUT
          echo " Servidor reporta → ACTIVE=$ACTIVE | NEXT=$NEXT"

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/gcp_key

  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: determine-color
    env:
      ACTIVE: ${{ needs.determine-color.outputs.active }}
      NEXT: ${{ needs.determine-color.outputs.next }}
    steps:
      - uses: actions/checkout@v4

      - name: Blue-Green Deploy en GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: ACTIVE,NEXT
          script: |
            cd ~/devops
            git pull origin main
            echo "Pipeline decidió → Activo: $ACTIVE | Desplegando: $NEXT"

            # 1. Bajar imagen nueva y levantar contenedor NEXT
            docker compose pull app-$NEXT
            docker compose up -d app-$NEXT
            sleep 5

            # 2. Health check antes de switchear
            PORT=$([ "$NEXT" = "blue" ] && echo 3001 || echo 3002)
            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT/health)
            if [ "$HEALTH" != "200" ]; then
              echo " app-$NEXT no responde (HTTP $HEALTH) — abortando switch"
              docker compose stop app-$NEXT
              docker compose rm -f app-$NEXT
              exit 1
            fi
            echo " app-$NEXT saludable (HTTP $HEALTH)"

            # 3. Switch nginx → apuntar a NEXT
            sed -i "s/app-$ACTIVE/app-$NEXT/g" nginx/nginx.conf
            docker exec nginx-proxy nginx -s reload
            echo " Nginx redirigido de app-$ACTIVE a app-$NEXT"

            # 4. Borrar contenedor ACTIVE
            docker compose stop app-$ACTIVE
            docker compose rm -f app-$ACTIVE
            echo "  app-$ACTIVE eliminado"

            echo " Switch de $ACTIVE → $NEXT exitoso"
