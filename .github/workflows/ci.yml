name: DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-blue:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proyecto-devops
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests (blue)
        run: npm test

  test-green:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proyecto-devops-green
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests (green)
        run: npm test