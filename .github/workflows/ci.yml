script: |
            TAG=${{ needs.build-and-push.outputs.tag }}
            REPO=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')

            cd ~/remedevops
            git pull origin main

            # Detectar cual fue el ultimo deploy
            if [ -f .current_color ]; then
              LAST=$(cat .current_color)
            else
              LAST=blue
            fi

            # Alternar color
            if [ "$LAST" = "blue" ]; then
              NEXT=green
            else
              NEXT=blue
            fi

            echo "Desplegando: $NEXT"

            # Login GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull imagen nueva
            docker pull $REPO/app-$NEXT:$TAG

            # Bajar app-active viejo
            docker stop app-active || true
            docker rm app-active || true

            # Levantar nuevo como app-active
            docker run -d \
              --name app-active \
              --network remedevops_default \
              -e VERSION=$NEXT \
              -e PORT=3000 \
              -p 3000:3000 \
              $REPO/app-$NEXT:$TAG

            # Health check
            STATUS=0
            for i in {1..15}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
              if [ "$STATUS" = "200" ]; then
                echo "App $NEXT lista!"
                break
              fi
              echo "Esperando ($i)..."
              sleep 3
            done

            # Rollback si falla
            if [ "$STATUS" != "200" ]; then
              echo "Falló → rollback"
              docker stop app-active || true
              docker rm app-active || true
              docker run -d \
                --name app-active \
                --network remedevops_default \
                -e VERSION=$LAST \
                -e PORT=3000 \
                -p 3000:3000 \
                $REPO/app-$LAST:latest
              exit 1
            fi

            # Guardar color actual
            echo $NEXT > .current_color

            echo "Deploy exitoso - ahora en $NEXT"
