name: DevOps Pipeline PRO

on:
  push:
    branches: ["main"]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: sudo apt-get update -y && sudo apt-get install -y python3 make g++

      - working-directory: ./proyecto-devops
        run: |
          npm ci --build-from-source
          npm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push BLUE
        uses: docker/build-push-action@v5
        with:
          context: ./proyecto-devops
          push: true
          build-args: COLOR=blue
          tags: |
            ghcr.io/${{ github.repository }}/app-blue:${{ steps.vars.outputs.tag }}

      - name: Build & Push GREEN
        uses: docker/build-push-action@v5
        with:
          context: ./proyecto-devops
          push: true
          build-args: COLOR=green
          tags: |
            ghcr.io/${{ github.repository }}/app-green:${{ steps.vars.outputs.tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy Blue/Green
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |

            TAG=${{ needs.build-and-push.outputs.image_tag }}

            cd ~/remedevops

            # Detectar activo
            if grep -q "app-blue" nginx/nginx.conf; then
              ACTIVE=blue
              NEXT=green
            else
              ACTIVE=green
              NEXT=blue
            fi

            echo "Activo: $ACTIVE → Nuevo: $NEXT"

            # 🧹 Limpiar imagen anterior
            docker image rm ghcr.io/${{ github.repository }}/app-$NEXT:$TAG || true

            # 📥 Pull real
            docker pull ghcr.io/${{ github.repository }}/app-$NEXT:$TAG

            # 🚀 Levantar nuevo
            docker compose up -d --force-recreate app-$NEXT

            # 🧠 Espera inteligente
            PORT=$([ "$NEXT" = "blue" ] && echo 3001 || echo 3002)

            for i in {1..15}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT/health)
              if [ "$STATUS" = "200" ]; then
                echo "Nueva versión OK"
                break
              fi
              echo "Esperando... intento $i"
              sleep 3
            done

            # ❌ Si falla → rollback
            if [ "$STATUS" != "200" ]; then
              echo "Falló deploy → rollback"
              docker compose stop app-$NEXT
              docker compose rm -f app-$NEXT
              exit 1
            fi

            # 🔁 Switch nginx
            sed -i "s/app-$ACTIVE/app-$NEXT/g" nginx/nginx.conf

            docker exec nginx-proxy nginx -t || exit 1
            docker exec nginx-proxy nginx -s reload

            echo "Tráfico ahora en app-$NEXT"

            # 🧹 Eliminar viejo
            docker compose stop app-$ACTIVE
            docker compose rm -f app-$ACTIVE

            echo "Deploy exitoso 🚀"
