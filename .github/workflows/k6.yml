name: K6

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install build tools
        run: sudo apt-get update -y && sudo apt-get install -y python3 make g++ build-essential

      - name: Reset databases
        run: |
          rm -f proyecto-devops/database.db
          rm -f proyecto-devops-green/database.db

      - name: Install & Test blue
        working-directory: ./proyecto-devops
        run: |
          npm ci --build-from-source
          npm test

      - name: Install & Test green
        working-directory: ./proyecto-devops-green
        run: |
          npm ci --build-from-source
          npm test

  k6:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update -y && sudo apt-get install -y python3 make g++ build-essential

      - name: Install dependencies blue
        working-directory: ./proyecto-devops
        run: npm ci --build-from-source

      - name: Start blue app
        working-directory: ./proyecto-devops
        run: |
          node src/index.js &
          sleep 3

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 tests
        run: k6 run proyecto-devops/k6/load-test.js

  deploy:
    runs-on: ubuntu-latest
    needs: k6
    steps:
      - uses: actions/checkout@v4

      - name: Deploy a GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~/devops
            git pull origin main
            docker compose down
            docker compose up -d --build
            echo "Deploy exitoso"